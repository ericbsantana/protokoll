[profile.default]
src = "src/contracts"
out = "out"
test = "test/contracts"
libs = ["lib"]
solc = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 200

# Invariant testing config - see test/contracts/AdapterInvariant.t.sol.
# fail_on_revert = false because the handler intentionally exercises both
# valid and invalid call shapes (e.g. fulfill on a non-pending request).
# Reverts are expected outcomes, not bugs; the invariants check post-state.
[invariant]
runs = 512
depth = 50
fail_on_revert = false

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

[etherscan]
monad_testnet = { key = "${MONAD_ETHERSCAN_API_KEY}", url = "https://testnet.monadexplorer.com/api" }
