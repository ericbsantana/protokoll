name: badges

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: badges
  cancel-in-progress: false

jobs:
  rounds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx tsx packages/protokoll/src/scripts/fetchStats.ts

      - name: commit badges if changed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const tracked = execSync('git diff --name-only HEAD -- .github/badges/', { encoding: 'utf8' })
              .split('\n').filter(Boolean);
            const untracked = execSync('git ls-files --others --exclude-standard .github/badges/', { encoding: 'utf8' })
              .split('\n').filter(Boolean);
            const files = [...new Set([...tracked, ...untracked])];

            if (files.length === 0) {
              core.info('badge files unchanged, skipping commit');
              return;
            }
            core.info(`committing ${files.length} badge file(s): ${files.join(', ')}`);

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', '');

            const { data: ref } = await github.rest.git.getRef({
              owner, repo, ref: `heads/${branch}`,
            });
            const headSha = ref.object.sha;

            const { data: headCommit } = await github.rest.git.getCommit({
              owner, repo, commit_sha: headSha,
            });

            const treeItems = await Promise.all(files.map(async (file) => {
              const content = fs.readFileSync(file, 'base64');
              const { data: blob } = await github.rest.git.createBlob({
                owner, repo, content, encoding: 'base64',
              });
              return { path: file, mode: '100644', type: 'blob', sha: blob.sha };
            }));

            const { data: tree } = await github.rest.git.createTree({
              owner, repo,
              base_tree: headCommit.tree.sha,
              tree: treeItems,
            });

            const { data: commit } = await github.rest.git.createCommit({
              owner, repo,
              message: 'chore(badges): refresh rounds-fulfilled count',
              tree: tree.sha,
              parents: [headSha],
            });

            await github.rest.git.updateRef({
              owner, repo,
              ref: `heads/${branch}`,
              sha: commit.sha,
            });

            core.info(`committed ${commit.sha}`);
