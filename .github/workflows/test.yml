name: test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: conventional commits
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git log --no-merges --format='%s' "origin/$BASE_REF..HEAD" | while read -r msg; do
            echo "$msg" | grep -qE '^(feat|fix|chore|docs|test|refactor|style|ci|perf|build|revert)(\([^)]+\))?!?: .+' || {
              echo "::error::commit subject not conventional: $msg"
              exit 1
            }
          done
      - uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: 1.7.0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: forge fmt
        working-directory: packages/protokoll
        run: forge fmt --check

  forge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/protokoll
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive # forge-std submodule under packages/protokoll/lib
      - uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: 1.7.0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: forge build --sizes
      - run: forge test -vvv
      - name: invariant suite (1024 runs / 100 depth)
        run: forge test --match-contract AdapterInvariant -vvv
        env:
          FOUNDRY_INVARIANT_RUNS: "1024"
          FOUNDRY_INVARIANT_DEPTH: "100"
      - run: forge snapshot --check --no-match-contract AdapterInvariant

  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test
