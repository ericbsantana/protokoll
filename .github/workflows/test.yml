name: test

on:
  push:
    branches: [main]
  pull_request:

# Action versions pinned to commit SHAs. To bump, re-resolve with:
#   git ls-remote https://github.com/<owner>/<repo> v6^{}

jobs:
  forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive   # lib/forge-std is a git submodule
      - uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
      - run: forge --version
      - run: forge build --sizes
      - run: forge test -vvv
      - run: forge snapshot --check

  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
